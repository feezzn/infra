name: Infra CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - prod
          - global

      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

      confirm_destroy:
        description: 'Type DESTROY to allow destroy action'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION_DEV: us-east-2
  AWS_REGION_PROD: us-east-1
  AWS_REGION_GLOBAL: us-east-1
  AWS_ROLE_ARN_DEV: arn:aws:iam::660830512266:role/iac-infra
  AWS_ROLE_ARN_PROD: arn:aws:iam::660830512266:role/iac-infra
  AWS_ROLE_ARN_GLOBAL: arn:aws:iam::660830512266:role/iac-infra

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: infra-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set environment vars
        id: vars
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "WORKDIR=environments/dev" >> "$GITHUB_OUTPUT"
            echo "REGION=${{ env.AWS_REGION_DEV }}" >> "$GITHUB_OUTPUT"
            echo "ROLE_ARN=${{ env.AWS_ROLE_ARN_DEV }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.environment }}" = "prod" ]; then
            echo "WORKDIR=environments/prod" >> "$GITHUB_OUTPUT"
            echo "REGION=${{ env.AWS_REGION_PROD }}" >> "$GITHUB_OUTPUT"
            echo "ROLE_ARN=${{ env.AWS_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "WORKDIR=environments/global" >> "$GITHUB_OUTPUT"
            echo "REGION=${{ env.AWS_REGION_GLOBAL }}" >> "$GITHUB_OUTPUT"
            echo "ROLE_ARN=${{ env.AWS_ROLE_ARN_GLOBAL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.vars.outputs.ROLE_ARN }}
          aws-region: ${{ steps.vars.outputs.REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ steps.vars.outputs.WORKDIR }}
        run: terraform init -upgrade -reconfigure -lock-timeout=5m

      - name: Terraform plan (for plan/apply)
        if: inputs.action == 'plan' || inputs.action == 'apply'
        working-directory: ${{ steps.vars.outputs.WORKDIR }}
        run: terraform plan -out=tfplan -input=false -lock-timeout=5m

      - name: Upload plan artifact
        if: inputs.action == 'plan' || inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ steps.vars.outputs.WORKDIR }}/tfplan
          if-no-files-found: error

      - name: Terraform apply
        if: inputs.action == 'apply'
        working-directory: ${{ steps.vars.outputs.WORKDIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Validate destroy confirmation
        if: inputs.action == 'destroy'
        shell: bash
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "Destroy bloqueado. Para continuar, preencha confirm_destroy com DESTROY."
            exit 1
          fi

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ steps.vars.outputs.WORKDIR }}
        run: terraform destroy -input=false -auto-approve -lock-timeout=5m
