name: Infra CI

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/**'

  pull_request:

jobs:
  changed-files:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev:
              - 'environments/dev/**'
              - 'modules/**'
              - '.tflint.*'
              - '.tfsec.yaml'
            prod:
              - 'environments/prod/**'
              - 'modules/**'
              - '.tflint.*'
              - '.tfsec.yaml'
            global:
              - 'environments/global/**'
              - 'modules/**'
              - '.tflint.*'
              - '.tfsec.yaml'

      - name: Build changed environment matrix
        id: build-matrix
        run: |
          envs=()

          if [ "${{ steps.filter.outputs.dev }}" = "true" ]; then
            envs+=("dev")
          fi
          if [ "${{ steps.filter.outputs.prod }}" = "true" ]; then
            envs+=("prod")
          fi
          if [ "${{ steps.filter.outputs.global }}" = "true" ]; then
            envs+=("global")
          fi

          if [ ${#envs[@]} -eq 0 ]; then
            echo 'matrix=[]' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            matrix_json=$(printf '%s\n' "${envs[@]}" | jq -R . | jq -s -c .)
            echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash

      - name: Run actionlint
        run: ./actionlint

  terraform-fmt:
    name: Terraform Fmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate (${{ matrix.environment }})
    needs: changed-files
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.changed-files.outputs.matrix) }}

    if: needs.changed-files.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (local)
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate

  tflint:
    name: TFLint (${{ matrix.environment }})
    needs: changed-files
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.changed-files.outputs.matrix) }}

    if: needs.changed-files.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        working-directory: environments/${{ matrix.environment }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: tflint --init --config=../../.tflint.soft.hcl

      - name: Run TFLint (soft)
        working-directory: environments/${{ matrix.environment }}
        run: tflint --recursive --config=../../.tflint.soft.hcl

      - name: Run TFLint (strict on main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: environments/${{ matrix.environment }}
        run: tflint --recursive --config=../../.tflint.strict.hcl

  tfsec:
    name: tfsec (${{ matrix.environment }})
    needs: changed-files
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.changed-files.outputs.matrix) }}

    if: needs.changed-files.outputs.has_changes == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: environments/${{ matrix.environment }}
          format: sarif
          additional_args: --config-file .tfsec.yaml --tfvars-file environments/${{ matrix.environment }}/terraform.tfvars --out tfsec-${{ matrix.environment }}.sarif

      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec-${{ matrix.environment }}.sarif
          category: tfsec-${{ matrix.environment }}
